<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Family</title>
<link rel="stylesheet" href="../login.css">
</head>
<body>

<div class="card">
    <h2 class="title">Join Family</h2>
    <p class="login-link" id="familyNameDisplay" style="text-align:center;font-size:0.9rem;margin-bottom:10px;color:#5a4e46;">Loading invitation...</p>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" required>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter email address" required>

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" required>

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm password" required>

    <button class="btn" id="acceptBtn">Create Account</button>

    <p class="login-link" style="margin-top:12px;">
        Already have an account? <a href="../login.html">Log in</a>
    </p>

    <div id="message" style="text-align:center;font-size:0.85rem;margin-top:10px;"></div>
</div>

<script>
const API = '/api';

function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

const token = getQueryParam('token');
const msgDiv = document.getElementById('message');
const familyDisplay = document.getElementById('familyNameDisplay');

if (!token) {
    familyDisplay.textContent = 'This invitation link is invalid or has expired.';
}

document.getElementById('acceptBtn').addEventListener('click', async function () {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!username || !email || !password || !confirm) {
        msgDiv.textContent = 'All fields are required.';
        msgDiv.style.color = '#a13d3d';
        return;
    }
    if (!email.includes('@') || !email.includes('.')) {
        msgDiv.textContent = 'Please enter a valid email address.';
        msgDiv.style.color = '#a13d3d';
        return;
    }
    if (password.length < 4) {
        msgDiv.textContent = 'Password must be at least 4 characters.';
        msgDiv.style.color = '#a13d3d';
        return;
    }
    if (password !== confirm) {
        msgDiv.textContent = 'Passwords do not match.';
        msgDiv.style.color = '#a13d3d';
        return;
    }

    try {
        const res = await fetch(API + '/invitations/accept', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, username, email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
            // Auto-login
            localStorage.setItem('user', JSON.stringify(data.user));
            msgDiv.textContent = 'Account created! Redirecting...';
            msgDiv.style.color = '#3c5a3c';
            setTimeout(function () { window.location.href = '../dashboard.html'; }, 1500);
        } else {
            msgDiv.textContent = data.error || 'Failed to create account.';
            msgDiv.style.color = '#a13d3d';
        }
    } catch (err) {
        msgDiv.textContent = 'Server error. Please try again.';
        msgDiv.style.color = '#a13d3d';
        console.error(err);
    }
});
</script>

</body>
</html>
