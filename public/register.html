<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Family Tracker</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="card">
        <h1 class="title">Family Tracker</h1>

        <p class="subtitle">Create your family group and start inviting members.</p>
        
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="user@gmail.com">
        
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username">
        
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
        
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Confirm password">

        <label for="familyName">Family Name</label>
        <input type="text" id="familyName" placeholder="e.g., The Johnsons">
        <p class="invite-note" id="inviteNote"></p>
        
        <button class="btn" id="registerBtn">Register</button>
        
        <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
    </div>
    <div id="notification-container">
        <span id="notification-message"></span>
    </div>
    <script src="javascript/offline-auth.js" defer></script>
    <script src="javascript/register-handler.js" defer></script>
</body>
</html>
