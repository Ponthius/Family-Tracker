<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="profile.css">
  <title>Profile Settings - Family Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/23.11.5/i18next.min.js"></script>
</head>
<body>

  <div class="card">

    <!-- BREADCRUMB -->
    <nav class="breadcrumb" aria-label="breadcrumb" style="margin-bottom: 1.2rem;">
      <ol style="list-style:none; display:flex; gap:0.5rem; font-size:0.85rem;">
        <li><a href="dashbaord.html" style="color:#8b7355; font-weight:600;">Dashboard</a></li>
        <li style="color:#c8bfb5;">/</li>
        <li><a href="members.html" style="color:#8b7355; font-weight:600;">Members</a></li>
        <li style="color:#c8bfb5;">/</li>
        <li style="color:#2c2420; font-weight:600;">Profile</li>
      </ol>
    </nav>

    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span class="page-title" data-i18n="nav.title">Profile Settings</span>
    </div>

    <!-- Profile photo section -->
    <div class="photo-section">
      <div class="photo-wrapper">
        <div class="profile-photo" id="photo-display"></div>
        <button class="change-photo-btn" onclick="document.getElementById('photo-input').click()">
          Change Photo
        </button>
        <input type="file" id="photo-input" accept="image/*" onchange="previewPhoto(event)" />
      </div>
    </div>

    <!-- EDIT PROFILE SECTION -->
    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span data-i18n="sections.profile">Edit Profile</span>
    </div>

    <div class="field">
      <label for="username" data-i18n="fields.username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <div class="field">
      <label for="fullname" data-i18n="fields.fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="Enter your full name e.g. Naiga Hawah" />
    </div>

    <div class="field">
      <label for="email" data-i18n="fields.email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your email e.g. hawah@email.com" />
    </div>

    <div class="divider"></div>

    <!-- EDIT PASSWORD SECTION -->
    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span data-i18n="sections.password">Edit Password</span>
    </div>

    <div class="field">
      <label for="current-password" data-i18n="fields.current_pass">Current Password</label>
      <input type="password" id="current-password" placeholder="Enter your current password" />
    </div>

    <div class="field">
      <label for="new-password" data-i18n="fields.new_pass">New Password</label>
      <input type="password" id="new-password" placeholder="Enter your new password" />
    </div>

    <div class="field">
      <label for="confirm-password" data-i18n="fields.confirm_pass">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm your new password" />
    </div>

    <div class="divider"></div>

    <!-- WORKSPACE CUSTOMIZATION SECTION -->
    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span data-i18n="sections.workspace">Workspace Customization</span>
    </div>

    <div class="field">
      <label for="family-title" data-i18n="fields.family_title">Family Title</label>
      <input type="text" id="family-title" placeholder="Enter workspace family title e.g. Smith Family" />
    </div>

    <div class="field">
      <label for="workspace-color" data-i18n="fields.theme_color">Theme Color</label>
      <div class="color-picker-wrapper">
        <input type="color" id="workspace-color" value="#3d3530" oninput="updateColorPreview(this.value)">
        <span class="color-value-preview" id="color-code">#3D3530</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- LANGUAGE SELECTOR -->
    <div class="field">
      <label for="language-select" data-i18n="fields.app_lang">Application Language</label>
      <select id="language-select" class="lang-dropdown" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="sw">Kiswahili</option>
        <option value="lg">Luganda</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
      </select>
    </div>

    <button class="save-btn-bottom" onclick="saveProfileSettings()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span data-i18n="buttons.save">Save Changes</span>
    </button>

    <div class="success-msg" id="success-msg">Profile settings saved successfully!</div>
    <div class="error-msg" id="error-msg"></div>

  </div>

  <script>
    const API = '/api';

    const resources = {
      en: { translation: {
        "nav.title": "Profile Settings",
        "sections.profile": "Edit Profile",
        "sections.password": "Edit Password",
        "sections.workspace": "Workspace Customization",
        "fields.username": "Username",
        "fields.fullname": "Full Name",
        "fields.email": "Email Address",
        "fields.current_pass": "Current Password",
        "fields.new_pass": "New Password",
        "fields.confirm_pass": "Confirm New Password",
        "fields.family_title": "Family Title",
        "fields.theme_color": "Theme Color",
        "fields.app_lang": "Application Language",
        "buttons.save": "Save Changes",
        "messages.success": "Profile settings saved successfully!"
      }},
      sw: { translation: {
        "nav.title": "Mipangilio ya Wasifu",
        "sections.profile": "Hariri Wasifu",
        "sections.password": "Badilisha Nywila",
        "sections.workspace": "Urekebishaji wa Eneo la Kazi",
        "fields.username": "Jina la Mtumiaji",
        "fields.fullname": "Majina Kamili",
        "fields.email": "Anwani ya Barua Pepe",
        "fields.current_pass": "Nywila ya Sasa",
        "fields.new_pass": "Nywila Mpya",
        "fields.confirm_pass": "Thibitisha Nywila Mpya",
        "fields.family_title": "Jina la Familia",
        "fields.theme_color": "Rangi ya Maudhui",
        "fields.app_lang": "Lugha ya Programu",
        "buttons.save": "Hifadhi Mabadiliko",
        "messages.success": "Mipangilio ya wasifu imehifadhiwa kikamilifu!"
      }},
      lg: { translation: {
        "nav.title": "Enkyukakyuka z'Akawunti",
        "sections.profile": "Kyusa Akawunti",
        "sections.password": "Kyusa Ssekula",
        "sections.workspace": "Kola Enkyukakyuka z'Akawunti",
        "fields.username": "Erinnya ly'okukozesa",
        "fields.fullname": "Amanya Gali mu Buwandiike",
        "fields.email": "Endagiriro ya Emmere",
        "fields.current_pass": "Ssekula Ekadde",
        "fields.new_pass": "Ssekula Empya",
        "fields.confirm_pass": "Kasa Ssekula Empya",
        "fields.family_title": "Erinnya ly'Amaka",
        "fields.theme_color": "Langatenda",
        "fields.app_lang": "Olulimi lw'Enkola",
        "buttons.save": "Terekebza Enkyukakyuka",
        "messages.success": "Enkyukakyuka ziterekedwa bulungi!"
      }},
      fr: { translation: {
        "nav.title": "Paramètres du Profil",
        "sections.profile": "Modifier le Profil",
        "sections.password": "Modifier le Mot de Passe",
        "sections.workspace": "Personnalisation de l'Espace",
        "fields.username": "Nom d'utilisateur",
        "fields.fullname": "Nom Complet",
        "fields.email": "Adresse E-mail",
        "fields.current_pass": "Mot de Passe Actuel",
        "fields.new_pass": "Nouveau Mot de Passe",
        "fields.confirm_pass": "Confirmer le Nouveau Mot de Passe",
        "fields.family_title": "Titre de la Famille",
        "fields.theme_color": "Couleur du Thème",
        "fields.app_lang": "Langue de l'Application",
        "buttons.save": "Enregistrer",
        "messages.success": "Paramètres enregistrés avec succès !"
      }},
      es: { translation: {
        "nav.title": "Ajustes del Perfil",
        "sections.profile": "Editar Perfil",
        "sections.password": "Editar Contraseña",
        "sections.workspace": "Personalización del Espacio",
        "fields.username": "Nombre de Usuario",
        "fields.fullname": "Nombre Completo",
        "fields.email": "Correo Electrónico",
        "fields.current_pass": "Contraseña Actual",
        "fields.new_pass": "Nueva Contraseña",
        "fields.confirm_pass": "Confirmar Nueva Contraseña",
        "fields.family_title": "Título de la Familia",
        "fields.theme_color": "Color del Tema",
        "fields.app_lang": "Idioma de la Aplicación",
        "buttons.save": "Guardar Cambios",
        "messages.success": "¡Ajustes guardados con éxito!"
      }}
    };

    function getStoredUser() {
      try { return JSON.parse(localStorage.getItem('user')) || {}; }
      catch (e) { return {}; }
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg || i18next.t('messages.success');
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      setTimeout(function () { el.style.display = 'none'; }, 3000);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
      setTimeout(function () { el.style.display = 'none'; }, 5000);
    }

    function previewPhoto(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          const photoDisplay = document.getElementById('photo-display');
          photoDisplay.innerHTML = "<img src='" + e.target.result + "' style='width:100%;height:100%;border-radius:50%;object-fit:cover;'>";
        };
        reader.readAsDataURL(file);
      }
    }

    async function initTranslations() {
      const savedLang = localStorage.getItem('app_lang') || 'en';
      await i18next.init({ lng: savedLang, fallbackLng: 'en', resources: resources });
      document.getElementById('language-select').value = savedLang;
      applyTranslations();
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        el.textContent = i18next.t(el.getAttribute('data-i18n'));
      });
    }

    function changeLanguage(lang) {
      i18next.changeLanguage(lang, function () {
        applyTranslations();
        localStorage.setItem('app_lang', lang);
      });
    }

    function adjustColorBrightness(hex, percent) {
      var R = parseInt(hex.substring(1,3),16);
      var G = parseInt(hex.substring(3,5),16);
      var B = parseInt(hex.substring(5,7),16);
      R = Math.min(255, Math.max(0, parseInt(R*(100+percent)/100)));
      G = Math.min(255, Math.max(0, parseInt(G*(100+percent)/100)));
      B = Math.min(255, Math.max(0, parseInt(B*(100+percent)/100)));
      return '#' + [R,G,B].map(c => c.toString(16).padStart(2,'0')).join('');
    }

    function updateColorPreview(val) {
      document.getElementById('color-code').innerText = val.toUpperCase();
      document.documentElement.style.setProperty('--theme-color', val);
      document.documentElement.style.setProperty('--theme-dark', adjustColorBrightness(val, -15));
      document.documentElement.style.setProperty('--theme-dark-hover', adjustColorBrightness(val, -30));
    }

    function initTheme() {
      var savedColor = localStorage.getItem('workspace_theme_color') || '#3d3530';
      document.getElementById('workspace-color').value = savedColor;
      updateColorPreview(savedColor);
    }

    function initFamilyTitle() {
      document.getElementById('family-title').value = localStorage.getItem('family_title') || '';
    }

    async function loadProfile() {
      initTheme();
      initFamilyTitle();
      var user = getStoredUser();
      if (!user.id) { window.location.href = '/login.html'; return; }
      try {
        var res = await fetch(API + '/profile/' + user.id);
        var data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error);
        document.getElementById('username').value = data.user.username || '';
        document.getElementById('fullname').value = data.user.fullname || '';
        document.getElementById('email').value = data.user.email || '';
      } catch (err) {
        document.getElementById('username').value = user.username || '';
        document.getElementById('email').value = user.email || '';
      }
    }

    async function saveProfileSettings() {
      var user = getStoredUser();
      if (!user.id) { showError('You must be logged in to update your profile.'); return; }

      var username = document.getElementById('username').value.trim();
      var fullname = document.getElementById('fullname').value.trim();
      var email = document.getElementById('email').value.trim();
      var currentPassword = document.getElementById('current-password').value;
      var newPassword = document.getElementById('new-password').value;
      var confirmPassword = document.getElementById('confirm-password').value;
      var familyTitle = document.getElementById('family-title').value.trim();
      var themeColor = document.getElementById('workspace-color').value;

      if (newPassword || confirmPassword) {
        if (!currentPassword) { showError('Please enter your current password to set a new one.'); return; }
        if (newPassword !== confirmPassword) { showError('New passwords do not match.'); return; }
        if (newPassword.length < 4) { showError('New password must be at least 4 characters.'); return; }
      }

      try {
        var profileRes = await fetch(API + '/profile/' + user.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, fullname, email })
        });
        var profileData = await profileRes.json();
        if (!profileRes.ok || !profileData.success) throw new Error(profileData.error || 'Failed to update profile');

        if (newPassword && currentPassword) {
          var passRes = await fetch(API + '/profile/' + user.id + '/password', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentPassword, newPassword })
          });
          var passData = await passRes.json();
          if (!passRes.ok || !passData.success) throw new Error(passData.error || 'Failed to update password');
        }

        localStorage.setItem('family_title', familyTitle);
        localStorage.setItem('workspace_theme_color', themeColor);
        user.username = username;
        user.email = email;
        if (fullname) user.fullname = fullname;
        localStorage.setItem('user', JSON.stringify(user));

        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        showSuccess();
      } catch (err) {
        showError(err.message);
      }
    }

    window.onload = function () {
      initTranslations();
      loadProfile();
    };
  </script>

</body>
</html>
