<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="profile.css">
  <title>Account Settings — Management Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en'
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>

  <div class="card">

    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span class="page-title">Account Settings</span>
      
      <button class="theme-toggle-btn" id="theme-toggle" title="Toggle System Mode">
        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Personal Information</span>
    </div>

    <div class="field">
      <label for="username">Username Unique Handle</label>
      <input type="text" id="username" placeholder="e.g. naiga_hawah" />
    </div>

    <div class="field">
      <label for="fullname">Legal Full Name</label>
      <input type="text" id="fullname" placeholder="e.g. Naiga Hawah" />
    </div>

    <div class="field">
      <label for="email">Verified Email Address</label>
      <input type="email" id="email" placeholder="name@domain.com" />
    </div>

    <div class="divider"></div>

    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Security & Credentials</span>
    </div>

    <div class="field">
      <label for="current-password">Current Secure Password</label>
      <input type="password" id="current-password" placeholder="••••••••••••" />
    </div>

    <div class="field">
      <label for="new-password">New Account Password</label>
      <input type="password" id="new-password" placeholder="Minimum 8 characters" />
    </div>

    <div class="field">
      <label for="confirm-password">Verify New Password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter your new password" />
    </div>

    <div class="divider"></div>

    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
      <span>Workspace Brand Styling</span>
    </div>

    <div class="field">
      <label for="family-title">Workspace Brand Name</label>
      <input type="text" id="family-title" placeholder="e.g. Smith Family Network" />
    </div>

    <div class="brand-preview-center">
      <div class="circular-logo-frame" id="logo-circle-frame">
        <svg id="placeholder-logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <img id="logo-img-element" src="" alt="Brand Logo Preview" style="display: none;" />
      </div>
    </div>

    <div class="field">
      <label for="workspace-logo">Corporate Workspace Logo</label>
      <div class="file-upload-wrapper">
        <div class="file-upload-container" id="upload-clickable-zone">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <div class="file-upload-btn" id="file-btn-text">Upload Local Image Asset</div>
        </div>
        <input type="file" id="workspace-logo" accept="image/*" style="display: none;">
      </div>
    </div>

    <div class="field">
      <label for="workspace-logo-url">Or Paste Direct Image URL Link</label>
      <input type="url" id="workspace-logo-url" placeholder="https://example.com/logo.png" />
    </div>

    <div class="field">
      <label for="workspace-color">Accent Core Theme Color</label>
      <div class="color-picker-wrapper">
        <input type="color" id="workspace-color" value="#5A3562">
        <span class="color-value-preview" id="color-code">#5A3562</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>Interface Application Language</label>
      
      <div class="search-box-wrapper">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="lang-search-bar" placeholder="Type to filter languages..." />
      </div>

      <div id="google_translate_element"></div>
    </div>

    <button class="save-btn-bottom" id="save-settings-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span style="display:inline; padding:0; background:none; color:inherit;">Commit Changes</span>
    </button>

    <div class="success-msg" id="success-msg">
      Account configuration profiles saved successfully!
    </div>
    <div class="error-msg" id="error-msg"></div>

  </div>

  <script type="text/javascript">
    function adjustColorBrightness(hex, percent) {
      let R = parseInt(hex.substring(1, 3), 16);
      let G = parseInt(hex.substring(3, 5), 16);
      let B = parseInt(hex.substring(5, 7), 16);
      R = parseInt(R * (100 + percent) / 100);
      G = parseInt(G * (100 + percent) / 100);
      B = parseInt(B * (100 + percent) / 100);
      R = (R < 255) ? R : 255; G = (G < 255) ? G : 255; B = (B < 255) ? B : 255;
      R = (R > 0) ? R : 0;     G = (G > 0) ? G : 0;     B = (B > 0) ? B : 0;
      return `#${R.toString(16).padStart(2, '0')}${G.toString(16).padStart(2, '0')}${B.toString(16).padStart(2, '0')}`;
    }

    function updateColorPreview(val) {
      document.getElementById('color-code').innerText = val.toUpperCase();
      const isDark = document.body.classList.contains('dark-mode');
      
      const displayColor = isDark ? adjustColorBrightness(val, 20) : val;
      const darkShade = adjustColorBrightness(displayColor, -15);
      const hoverShade = adjustColorBrightness(displayColor, -30);

      document.documentElement.style.setProperty('--theme-color', displayColor);
      document.documentElement.style.setProperty('--theme-dark', darkShade);
      document.documentElement.style.setProperty('--theme-dark-hover', hoverShade);
    }

    function toggleThemeMode() {
      const body = document.body;
      const sunIcon = document.querySelector('.sun-icon');
      const moonIcon = document.querySelector('.moon-icon');
      
      if (body.classList.contains('dark-mode')) {
        body.classList.remove('dark-mode');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
        localStorage.setItem('display_mode', 'light');
      } else {
        body.classList.add('dark-mode');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
        localStorage.setItem('display_mode', 'dark');
      }
      const currentColor = document.getElementById('workspace-color').value;
      updateColorPreview(currentColor);
    }

    function displayLogoImage(sourceUrl) {
      const imgElement = document.getElementById('logo-img-element');
      const placeholderIcon = document.getElementById('placeholder-logo-icon');
      
      if (sourceUrl && sourceUrl.trim() !== "") {
        imgElement.src = sourceUrl;
        imgElement.style.display = 'block';
        placeholderIcon.style.display = 'none';
      } else {
        imgElement.style.display = 'none';
        placeholderIcon.style.display = 'block';
      }
    }

    function initTheme() {
      const savedMode = localStorage.getItem('display_mode') || 'light';
      const sunIcon = document.querySelector('.sun-icon');
      const moonIcon = document.querySelector('.moon-icon');
      
      if (savedMode === 'dark') {
        document.body.classList.add('dark-mode');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        document.body.classList.remove('dark-mode');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }

      const savedColor = localStorage.getItem('workspace_theme_color') || '#5A3562';
      document.getElementById('workspace-color').value = savedColor;
      updateColorPreview(savedColor);

      const savedLogo = localStorage.getItem('workspace_logo_data');
      const savedUrl = localStorage.getItem('workspace_logo_url');

      if (savedUrl) {
        document.getElementById('workspace-logo-url').value = savedUrl;
        displayLogoImage(savedUrl);
      } else if (savedLogo) {
        displayLogoImage(savedLogo);
        document.getElementById('file-btn-text').innerText = "Loaded Local Image";
      }
    }

    function showSuccess() {
      const el = document.getElementById('success-msg');
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function handleLocalFileSelection() {
      const fileInput = document.getElementById('workspace-logo');
      const btnText = document.getElementById('file-btn-text');

      if (fileInput.files && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        btnText.innerText = file.name;

        const reader = new FileReader();
        reader.onload = function(event) {
          const dataUrl = event.target.result;
          displayLogoImage(dataUrl);
          localStorage.setItem('workspace_logo_data', dataUrl);
          localStorage.removeItem('workspace_logo_url');
          document.getElementById('workspace-logo-url').value = ""; 
        };
        reader.readAsDataURL(file);
      }
    }

    function handleUrlLinkChange(e) {
      const urlValue = e.target.value;
      if (urlValue.trim() !== "") {
        displayLogoImage(urlValue);
        localStorage.setItem('workspace_logo_url', urlValue);
        localStorage.removeItem('workspace_logo_data'); 
        document.getElementById('file-btn-text').innerText = "Upload Local Image Asset";
      } else {
        displayLogoImage("");
        localStorage.removeItem('workspace_logo_url');
      }
    }

    // Dynamic Live Language Search Filter Core Loop Logic
    document.getElementById('lang-search-bar').addEventListener('input', function(e) {
      const searchTerms = e.target.value.toLowerCase().trim();
      const googleSelect = document.querySelector('select.goog-te-combo');

      if (googleSelect) {
        const optionsList = googleSelect.getElementsByTagName('option');
        
        for (let i = 0; i < optionsList.length; i++) {
          const opt = optionsList[i];
          const textVal = opt.textContent.toLowerCase();
          
          // Keep the blank default line option active always
          if (opt.value === "") continue;

          if (textVal.includes(searchTerms)) {
            opt.style.display = 'block';
            opt.disabled = false;
          } else {
            opt.style.display = 'none';
            opt.disabled = true;
          }
        }
      }
    });

    // Wire up actions safely
    document.getElementById('theme-toggle').addEventListener('click', toggleThemeMode);
    document.getElementById('workspace-color').addEventListener('input', (e) => updateColorPreview(e.target.value));
    document.getElementById('workspace-logo-url').addEventListener('input', handleUrlLinkChange);
    document.getElementById('workspace-logo').addEventListener('change', handleLocalFileSelection);
    
    document.getElementById('upload-clickable-zone').addEventListener('click', () => {
      document.getElementById('workspace-logo').click();
    });

    document.getElementById('save-settings-btn').addEventListener('click', () => {
      const chosenColor = document.getElementById('workspace-color').value;
      localStorage.setItem('workspace_theme_color', chosenColor);
      showSuccess();
    });

    window.onload = () => {
      initTheme();
    };
  </script>
</body>
</html>
