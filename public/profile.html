<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="profile.css">
  <title>Profile Settings - Family Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="card">

    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span class="page-title">Profile Settings</span>
    </div>

    <!-- EDIT PROFILE SECTION -->
    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Profile
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <div class="field">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="Enter your full name e.g. Naiga Hawah" />
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Enter your email e.g. hawah@email.com" />
    </div>

    <div class="divider"></div>

    <!-- EDIT PASSWORD SECTION -->
    <div class="section-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Edit Password
    </div>

    <div class="field">
      <label for="current-password">Current Password</label>
      <input type="password" id="current-password" placeholder="Enter your current password" />
    </div>

    <div class="field">
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="Enter your new password" />
    </div>

    <div class="field">
      <label for="confirm-password">Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm your new password" />
    </div>

    <button class="save-btn-bottom" onclick="saveProfileSettings()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save Changes
    </button>

    <div class="success-msg" id="success-msg">
      Profile settings saved successfully!
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="divider"></div>

    <div class="section-heading danger-heading">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>
      Delete Account
    </div>
    <p class="danger-note" id="delete-warning"></p>

    <div class="field">
      <label for="delete-password">Confirm Password</label>
      <input type="password" id="delete-password" placeholder="Enter your password to confirm" />
    </div>

    <button class="delete-btn" id="delete-account-btn" onclick="openDeleteModal()">
      Delete Account
    </button>

  </div>

  <div id="notification-container">
    <span id="notification-message"></span>
  </div>

  <div class="modal-overlay" id="delete-modal">
    <div class="modal-card">
      <div class="modal-title">Confirm Account Deletion</div>
      <p class="modal-text" id="delete-modal-text"></p>
      <div class="modal-actions">
        <button class="modal-btn ghost" type="button" onclick="closeDeleteModal()">Cancel</button>
        <button class="modal-btn danger" type="button" onclick="confirmDeleteAccount()">Yes, delete</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';

    function getStoredUser() {
      try {
        return JSON.parse(localStorage.getItem('user')) || {};
      } catch (e) {
        return {};
      }
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg || 'Profile settings saved successfully!';
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      setTimeout(function () { el.style.display = 'none'; }, 3000);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
      setTimeout(function () { el.style.display = 'none'; }, 5000);
    }

    function showNotification(message, type) {
      const container = document.getElementById('notification-container');
      const msgSpan = document.getElementById('notification-message');
      if (!container || !msgSpan) return;
      container.className = `notif-${type || 'info'}`;
      msgSpan.textContent = message;
      container.style.opacity = '1';
      container.style.pointerEvents = 'auto';
      setTimeout(() => {
        container.style.opacity = '0';
        container.style.pointerEvents = 'none';
      }, 3200);
    }

    function updateDeleteWarning(profileUser) {
      const warning = document.getElementById('delete-warning');
      const modalText = document.getElementById('delete-modal-text');
      const user = profileUser || getStoredUser();
      const isAdmin = user.role === 'admin' || user.role === 'father';
      const familyLabel = user.familyName ? `the ${user.familyName} family` : 'your family';
      const adminText = `Deleting your admin account will permanently remove ${familyLabel}, all members, tasks, and schedules. This cannot be undone.`;
      const memberText = 'Deleting your account removes your profile and tasks assigned to you. Your family and other members remain active.';

      if (warning) {
        warning.textContent = isAdmin ? adminText : memberText;
      }
      if (modalText) {
        modalText.textContent = isAdmin ? adminText : memberText;
      }
    }

    function openDeleteModal() {
      const user = getStoredUser();
      const password = document.getElementById('delete-password').value;
      if (!user.id) {
        showError('You must be logged in to delete your account.');
        return;
      }
      if (!password) {
        showError('Please enter your password to confirm deletion.');
        return;
      }
      updateDeleteWarning(user);
      document.getElementById('delete-modal').classList.add('show');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('show');
    }

    async function confirmDeleteAccount() {
      const user = getStoredUser();
      const password = document.getElementById('delete-password').value;
      if (!password) {
        showError('Please enter your password to confirm deletion.');
        return;
      }

      try {
        const res = await fetch(API + '/profile/' + user.id + '/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.error || 'Failed to delete account');
        }

        closeDeleteModal();
        showNotification(data.message || 'Account deleted successfully.', 'success');
        localStorage.removeItem('user');
        localStorage.removeItem('offlineUser');
        localStorage.removeItem('registeredUsers');
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 1600);
      } catch (err) {
        showError(err.message);
      }
    }

    // --LOAD PROFILE FROM API--
    async function loadProfile() {
      const user = getStoredUser();
      if (!user.id) {
        // Not logged in — redirect to login
        window.location.href = '/login.html';
        return;
      }

      try {
        const res = await fetch(API + '/profile/' + user.id);
        const data = await res.json();

        if (!res.ok || !data.success) throw new Error(data.error);

        const u = data.user;

        document.getElementById('username').value = u.username || '';
        document.getElementById('fullname').value = u.fullname || '';
        document.getElementById('email').value = u.email || '';

        user.role = u.role || user.role;
        localStorage.setItem('user', JSON.stringify(user));
        updateDeleteWarning(user);

        // Sync any newly-saved fullname back to localStorage
        if (u.fullname) {
          user.fullname = u.fullname;
          localStorage.setItem('user', JSON.stringify(user));
        }
      } catch (err) {
        console.error('Could not load profile:', err);
        // Fill from localStorage as fallback
        document.getElementById('username').value = user.username || '';
        document.getElementById('email').value = user.email || '';
        updateDeleteWarning(user);
      }
    }

    // --SAVE PROFILE--
    async function saveProfileSettings() {
      const user = getStoredUser();
      if (!user.id) {
        showError('You must be logged in to update your profile.');
        return;
      }

      const username = document.getElementById('username').value.trim();
      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      // Validate password section
      if (newPassword || confirmPassword) {
        if (!currentPassword) {
          showError('Please enter your current password to set a new one.');
          return;
        }
        if (newPassword !== confirmPassword) {
          showError('New passwords do not match. Please try again.');
          return;
        }
        if (newPassword.length < 4) {
          showError('New password must be at least 4 characters.');
          return;
        }
      }

      try {
        // Update profile fields
        const profileRes = await fetch(API + '/profile/' + user.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, fullname, email })
        });

        const profileData = await profileRes.json();
        if (!profileRes.ok || !profileData.success) {
          throw new Error(profileData.error || 'Failed to update profile');
        }

        // Update password if provided
        if (newPassword && currentPassword) {
          const passRes = await fetch(API + '/profile/' + user.id + '/password', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentPassword, newPassword })
          });

          const passData = await passRes.json();
          if (!passRes.ok || !passData.success) {
            throw new Error(passData.error || 'Failed to update password');
          }
        }

        // Update localStorage with new data
        user.username = username;
        user.email = email;
        if (fullname) user.fullname = fullname;
        localStorage.setItem('user', JSON.stringify(user));

        // Clear password fields
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';

        showSuccess('Profile settings saved successfully!');
      } catch (err) {
        showError(err.message);
        console.error(err);
      }
    }

    // --INIT--
    loadProfile();
  </script>

</body>
</html>
