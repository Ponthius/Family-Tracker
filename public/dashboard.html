<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Family Tracker · Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="javascript/offline-queue.js"></script>
  <script src="javascript/sync-service.js"></script>
  <style>
    /* Added Styles for Back Button & Notifications */
    .back-btn-ui {
      background: transparent;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      transition: background 0.2s;
    }
    .back-btn-ui:hover { background: #f0f0f0; }

    #notification-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 30px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 9999;
      color: white;
      font-weight: 500;
      pointer-events: none;
    }
    .notif-success { background-color: #28a745; }
    .notif-error { background-color: #dc3545; }
    .notif-warning { background-color: #ffc107; color: #333; }
    .notif-info { background-color: #17a2b8; }
  </style>
</head>
<body>
 
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button id="myBackButton" class="back-btn-ui" aria-label="Go back">
        <i class="fas fa-arrow-left"></i> <span>Back</span>
      </button>
      
      <a href="dashboard.html" class="logo" style="text-decoration: none;">
        <i class="fas fa-users"></i>
        <span>Family Tracker</span>
      </a>
    </div>
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item-side active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
      <a href="tasks.html" class="nav-item-side" data-page="tasks"><i class="fas fa-calendar-alt"></i><span>Tasks</span></a>
      <a href="members.html" class="nav-item-side" data-page="members"><i class="fas fa-user-friends"></i><span>Members</span></a>
      <a href="schedule.html" class="nav-item-side" data-page="schedules"><i class="fas fa-clock"></i><span>Schedules</span></a>
      <a href="profile.html" class="nav-item-side" data-page="profile"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>
  </aside>

  <main class="main-content">
    <div class="top-bar">
      <div class="greeting">
        <h1><span id="greetingText">Good Morning</span> <span id="usernameDisplay"></span></h1>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <div class="user-badge" id="notificationBell" style="position: relative; cursor: pointer;">
          <i class="fas fa-bell"></i>
          <span id="notifCount" class="notif-badge" style="display: none;">0</span>
        </div>
        <a href="profile.html" class="user-badge" id="profileBtn"><i class="fas fa-user-circle"></i></a>
        <button class="hamburger-btn" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
      </div>
    </div>
    
    </main>
</div>

<div id="notification-container">
    <span id="notification-message"></span>
</div>

<script>
  const API = '/api';

  function getStoredUser() {
    try { return JSON.parse(localStorage.getItem('user')) || {}; }
    catch (e) { return {}; }
  }

  function getTimeGreeting() {
    const hour = new Date().getHours();
    if (hour < 12) return 'Good Morning';
    if (hour < 17) return 'Good Afternoon';
    return 'Good Evening';
  }

  function updateUserGreeting() {
    const user = getStoredUser();
    const username = user.username || 'Family';
    const gt = document.getElementById('greetingText');
    const ud = document.getElementById('usernameDisplay');
    const ud2 = document.getElementById('userNameDisplay');
    if (gt) gt.textContent = getTimeGreeting();
    if (ud) ud.textContent = username;
    if (ud2) ud2.textContent = username;
  }

  function setActiveNavItem(page) {
    document.querySelectorAll('[data-page]').forEach(el => {
      el.classList.toggle('active', el.getAttribute('data-page') === page);
    });
  }

  const path = window.location.pathname;
  const currentPage = path.split('/').pop().replace('.html', '') || 'dashboard';
  setActiveNavItem(currentPage);
  updateUserGreeting();

  // Hamburger menu
  const hamburger = document.getElementById('hamburgerBtn');
  const overlay = document.getElementById('mobileSidebarOverlay');
  const mobileSidebar = document.getElementById('mobileSidebar');
  const closeBtn = document.getElementById('closeSidebarBtn');

  function openSidebar() { if (mobileSidebar) mobileSidebar.classList.add('open'); if (overlay) overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeSidebar() { if (mobileSidebar) mobileSidebar.classList.remove('open'); if (overlay) overlay.classList.remove('active'); document.body.style.overflow = ''; }
  if (hamburger) hamburger.addEventListener('click', openSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);
  document.querySelectorAll('.mobile-nav-item').forEach(l => l.addEventListener('click', closeSidebar));

  // ----- Dashboard API calls -----

  async function loadKPIs() {
    try {
      const res = await fetch(API + '/dashboard/stats');
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error);
      document.getElementById('kpiTasks').textContent = String(data.stats.tasks).padStart(2, '0');
      document.getElementById('kpiMembers').textContent = String(data.stats.members).padStart(2, '0');
      document.getElementById('kpiSchedules').textContent = String(data.stats.schedules).padStart(2, '0');
      document.getElementById('kpiUpcoming').textContent = String(data.stats.upcoming).padStart(2, '0');
      document.getElementById('activityScore').textContent = data.stats.tasks + ' pending · ' + data.stats.members + ' members';
    } catch (err) {
      console.error('KPI load error:', err);
    }
  }

  async function loadRecentTasks() {
    try {
      const res = await fetch(API + '/dashboard/recent-tasks');
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error);
      const tbody = document.getElementById('recentEventsBody');
      if (!data.tasks || data.tasks.length === 0) {
        tbody.innerHTML = '<tr class="data-placeholder"><td colspan="3">No completed tasks yet</td></tr>';
        return;
      }
      tbody.innerHTML = data.tasks.map(t => {
        const d = new Date(t.EventDate);
        const dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        return '<tr><td>' + t.EventName + '</td><td>' + dateStr + '</td><td><span class="badge">Done</span></td></tr>';
      }).join('');
    } catch (err) {
      console.error('Recent tasks error:', err);
    }
  }

  async function loadUpcomingTasks() {
    try {
      const res = await fetch(API + '/dashboard/upcoming-tasks');
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error);
      const tbody = document.getElementById('upcomingEventsBody');
      if (!data.tasks || data.tasks.length === 0) {
        tbody.innerHTML = '<tr class="data-placeholder"><td colspan="3">No upcoming tasks</td></tr>';
        return;
      }
      tbody.innerHTML = data.tasks.map(t => {
        const d = new Date((t.TaskDate || '').includes('T') ? t.TaskDate : t.TaskDate + 'T' + (t.TaskTime || '00:00'));
        const dtStr = d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
        return '<tr><td>' + t.EventName + '</td><td>' + dtStr + '</td><td><span class="badge">' + (t.Username || '—') + '</span></td></tr>';
      }).join('');
    } catch (err) {
      console.error('Upcoming tasks error:', err);
    }
  }

  // ----- Notifications -----

  async function loadNotifications() {
    const user = getStoredUser();
    if (!user.id) return;

    try {
      const res = await fetch(API + '/notifications?userId=' + user.id);
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.error);

      const badge = document.getElementById('notifCount');
      if (data.count > 0) {
        badge.textContent = data.count;
        badge.style.display = 'inline';
      } else {
        badge.style.display = 'none';
      }

      window._notifications = data.notifications || [];
    } catch (err) {
      console.error('Notifications error:', err);
    }
  }

  document.getElementById('notificationBell').addEventListener('click', function (e) {
    e.stopPropagation();
    const dd = document.getElementById('notifDropdown');
    const notifs = window._notifications || [];

    if (dd.style.display === 'block') {
      dd.style.display = 'none';
      return;
    }

    if (notifs.length === 0) {
      dd.innerHTML = '<div style="padding: 16px 20px; color: #7a6e66; font-size: 0.85rem;">No new notifications</div>';
    } else {
      dd.innerHTML = notifs.map(n =>
        '<div style="padding: 10px 20px; border-bottom: 1px solid #e2d8d0; font-size: 0.85rem;">' +
        '<strong>' + n.TaskName + '</strong> assigned to you by ' + (n.AssignedByName || 'father') +
        '</div>'
      ).join('');
    }

    dd.style.display = 'block';
  });

  document.addEventListener('click', function () {
    const dd = document.getElementById('notifDropdown');
    if (dd) dd.style.display = 'none';
  });

  // ----- Notification System (team) -----
  function showNotification(message, type) {
    type = type || 'info';
    const container = document.getElementById('notification-container');
    const msgSpan = document.getElementById('notification-message');
    msgSpan.textContent = message;
    container.className = 'notif-' + type;
    container.style.opacity = '1';
    container.style.pointerEvents = 'auto';

    if (type === 'success' || type === 'info') {
      setTimeout(function () {
        container.style.opacity = '0';
        container.style.pointerEvents = 'none';
      }, 3000);
    }
  }

  // ----- Init -----
  loadKPIs();
  loadRecentTasks();
  loadUpcomingTasks();
  loadNotifications();
</script>
</body>
</html>
