<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Family Tracker · Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="javascript/offline-queue.js"></script>
  <script src="javascript/sync-service.js"></script>
  <style>
    /* Added Styles for Back Button & Notifications */
    .back-btn-ui {
      background: transparent;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      transition: background 0.2s;
    }
    .back-btn-ui:hover { background: #f0f0f0; }

    #notification-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 30px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 9999;
      color: white;
      font-weight: 500;
      pointer-events: none;
    }
    .notif-success { background-color: #28a745; }
    .notif-error { background-color: #dc3545; }
    .notif-warning { background-color: #ffc107; color: #333; }
    .notif-info { background-color: #17a2b8; }
  </style>
</head>
<body>
 
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <button id="myBackButton" class="back-btn-ui" aria-label="Go back">
        <i class="fas fa-arrow-left"></i> <span>Back</span>
      </button>
      
      <a href="dashboard.html" class="logo" style="text-decoration: none;">
        <i class="fas fa-users"></i>
        <span>Family Tracker</span>
      </a>
    </div>
    <div class="sidebar-nav">
      <a href="dashboard.html" class="nav-item-side active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
      <a href="tasks.html" class="nav-item-side" data-page="tasks"><i class="fas fa-calendar-alt"></i><span>Tasks</span></a>
      <a href="members.html" class="nav-item-side" data-page="members"><i class="fas fa-user-friends"></i><span>Members</span></a>
      <a href="schedule.html" class="nav-item-side" data-page="schedules"><i class="fas fa-clock"></i><span>Schedules</span></a>
      <a href="profile.html" class="nav-item-side" data-page="profile"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>
  </aside>

  <main class="main-content">
    <div class="top-bar">
      <div class="greeting">
        <h1><span id="greetingText">Good Morning</span> <span id="usernameDisplay"></span></h1>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <div class="user-badge" id="notificationBell" style="position: relative; cursor: pointer;">
          <i class="fas fa-bell"></i>
          <span id="notifCount" class="notif-badge" style="display: none;">0</span>
        </div>
        <a href="profile.html" class="user-badge" id="profileBtn"><i class="fas fa-user-circle"></i></a>
        <button class="hamburger-btn" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
      </div>
    </div>
    
    </main>
</div>

<div id="notification-container">
    <span id="notification-message"></span>
</div>

<script>
  // --- Back Button Logic ---
  document.addEventListener('DOMContentLoaded', () => {
    const backBtn = document.getElementById('myBackButton');
    if (backBtn) {
      backBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.history.length > 1 ? window.history.back() : window.location.href = 'dashboard.html';
      });
    }
  });

  // --- Notification System ---
  function showNotification(message, type = 'info') {
    const container = document.getElementById('notification-container');
    const msgSpan = document.getElementById('notification-message');
    msgSpan.textContent = message;
    container.className = 'notif-' + type;
    container.style.opacity = '1';
    container.style.pointerEvents = 'auto';

    if (type === 'success' || type === 'info') {
      setTimeout(() => {
        container.style.opacity = '0';
        container.style.pointerEvents = 'none';
      }, 3000);
    }
  }

  // --- (Keep your existing API functions and initialization code below here) ---
</script>
</body>
</html>
