<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Family Tracker</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="card">
        <h1 class="title">Family Tracker</h1>
        
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username">
        
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
        
        <button class="btn" id="loginBtn">Log In</button>
        
        <p class="login-link">Don't have an account? <a href="register.html">Register</a></p>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    alert(`Login successful! Welcome ${data.user.username} (${data.user.role})`);
                    // Store user info for dashboard
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirect to dashboard when ready
                    // window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (error) {
                alert('Error connecting to server. Make sure server is running.');
                console.error(error);
            }
        });
        
        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
