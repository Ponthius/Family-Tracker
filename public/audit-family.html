<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log</title>
  <link rel="stylesheet" href="audit.css">
</head>

<body>
  <div class="page">

    <div class="topbar">
      <h1 class="title">Family Tracker</h1>
      <p class="subtitle">Audit Log — Family Admin</p>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2 class="panel-title" id="auditPanelTitle">Family Audit Log</h2>
      </div>

      <!-- Filters -->
      <div class="filters-grid">
        <input type="text" id="filterSearch" class="search-input" placeholder="Search username or action...">
        <select id="filterRole">
          <option value="">All Roles</option>
          <option value="family_admin">Family Admin</option>
          <option value="father">Father</option>
          <option value="mother">Mother</option>
          <option value="child">Child</option>
        </select>
        <select id="filterAction">
          <option value="">All Actions</option>
          <option value="Login">Login</option>
          <option value="Logout">Logout</option>
          <option value="Register">Register</option>
          <option value="Task Created">Task Created</option>
          <option value="Task Assigned">Task Assigned</option>
          <option value="Task Deleted">Task Deleted</option>
          <option value="Event Created">Event Created</option>
          <option value="Event Rescheduled">Event Rescheduled</option>
          <option value="Profile Updated">Profile Updated</option>
          <option value="Password Changed">Password Changed</option>
          <option value="Account Deleted">Account Deleted</option>
          <option value="Account Recovery">Account Recovery</option>
          <option value="Member Invited">Member Invited</option>
          <option value="Language Changed">Language Changed</option>
          <option value="Failed Login">Failed Login</option>
        </select>
        <select id="filterStatus">
          <option value="">All Statuses</option>
          <option value="Success">Success</option>
          <option value="Failed">Failed</option>
        </select>
        <div class="date-range">
          <input type="date" id="filterDateFrom" title="From date">
          <span class="date-sep">to</span>
          <input type="date" id="filterDateTo" title="To date">
        </div>
        <button class="btn-secondary" id="clearFilterBtn">Clear Filters</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Role</th>
              <th>Action</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="auditTableBody"></tbody>
        </table>
        <p id="noAudit" class="no-results hidden">No audit records found.</p>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>

  </div>

  <script src="audit-family.js"></script>
</body>

</html>
